<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./img/logo.png" type="image/png" />
    <link rel="stylesheet" href="./css/cart.css" />
    <link rel="stylesheet" href="./css/common-elements.css" />
    <link rel="stylesheet" href="./css/header-footer.css" />

    <title>Shopping Cart</title>
  </head>

  <body>
    <header>
      <div class="logo-top">
        <a href="./index.html">
          <img src="./img/logo.png" alt="Logo" />
        </a>
      </div>
      <nav>
        <ul>
          <li><a href="./index.html"> Home </a></li>
          <li><a href="./categories.html"> Categories </a></li>
          <li><a href="./checkout.html"> Shop </a></li>
          <li><a href="./about.html"> About </a></li>
          <li><a href="./contact.html"> Contact</a></li>
        </ul>
      </nav>
      <div class="search-form">
        <form action="/search" method="get">
          <input type="search" name="query" placeholder="Search..." />
          <button type="submit">Search</button>
        </form>
      </div>
      <div class="topicon">
        <a href="./product-page.html">
          <img src="./img/wishlist.png" alt="wishlist" />
        </a>

        <a href="./checkout.html">
          <img src="./img/cart.png" alt="cart" />
        </a>
        <a href="login-page.html">
          <img src="./img/profile.png" alt="profile" />
        </a>
      </div>
      <div class="menu-icon">
        <a href="#">
          <img src="./img/menu.png" alt="Menu Icon" />
        </a>
      </div>
    </header>
    <main>
      <div class="cart-container">
        <div class="cart-items" id="cartItems"></div>

        <div class="summary">
          <h2>Order Summary</h2>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">0 €</span>
          </div>

          <div class="summary-row">
            <span>Shipping</span>
            <span id="shipping">10 €</span>
          </div>

          <hr style="margin: 15px 0" />

          <div class="summary-row total">
            <span>Total</span>
            <span id="total">0 €</span>
          </div>

          <button class="checkout">Checkout</button>
        </div>
      </div>
    </main>

    <footer>
      <div class="foter">
        <p>© 2025 Davas Studio</p>
        <div class="footerlinks">
          <h3>Information</h3>
          <ul>
            <li><a href="#"> Terms of Use</a></li>
            <li><a href="#">Payment Method</a></li>
            <li><a href="#">Data protection</a></li>
          </ul>
        </div>
        <div class="footerlinks1">
          <h3>Custumer support</h3>
          <ul>
            <li><a href="#"> Contact</a></li>
            <li><a href="#">Help</a></li>
            <li><a href="#">FAQ</a></li>
          </ul>
        </div>
        <div class="footercontact">
          <a href="https://www.facebook.com/davas">
            <img src="./img/facebook.png" alt="facebook" />
          </a>
          <a href="https://www.instagram.com/davas">
            <img src="./img/instagram.png" alt="instagram" />
          </a>
        </div>
      </div>
    </footer>
    <script src="js/cart.js"></script>
  </body>
</html>
